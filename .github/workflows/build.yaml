name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: bcmath, curl, gd, mbstring, openssl, pdo, xml, zip
          tools: composer:v2
          coverage: none

      - name: Install PHP deps
        run: composer install --no-interaction --no-dev --optimize-autoloader

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        run: bun install

      - name: Build assets
        run: bun x vite build